name: Deploy ChatCV app to GCP VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest  

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up SSH
      uses: webfactory/ssh-agent@v0.5.3
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }} 

    - name: Deploy to GCP VM
      run: |
        scp -o StrictHostKeyChecking=no -r ./* user@your-vm-ip:/home/user/chatcv-app
        ssh -o StrictHostKeyChecking=no user@your-vm-ip "cd /home/user/chatcv-app && ./deploy.sh"
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }} 




          